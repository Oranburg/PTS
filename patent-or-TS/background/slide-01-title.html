<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        
        .slide-container {
            width: 1280px;
            height: 720px;
            background-color: #1A1F36;
            color: #FFFFFF;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        .accent-line {
            width: 100px;
            height: 5px;
            background-color: #4A90E2;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 56px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
            color: #FFFFFF;
        }
        
        .subtitle {
            font-size: 28px;
            color: #B0C4DE;
            text-align: center;
            margin-bottom: 50px;
        }
        
        .course-info {
            font-size: 20px;
            color: #8A9BB0;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="accent-line"></div>
        <h1>Patent vs. Trade Secret</h1>
        <h1>Strategic Decision-Making</h1>
        <p class="subtitle">Real-World Hypotheticals from Peer-Reviewed Case Studies</p>
        <p class="course-info">Chapter 2: Identifying and Classifying Trade Secrets</p>
    </div>
</body>
</html>
