name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_run:
    workflows: ["pages build and deployment"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Include static chapter pages and shared stylesheet
        run: |
          mkdir -p dist/chapters
          cp chapters/*.html dist/chapters/
          mkdir -p dist/assets
          cp assets/site.css dist/assets/site.css
          mkdir -p dist/patent-or-TS
          cp patent-or-TS/index.html dist/patent-or-TS/
          cp patent-or-TS/class-activities.html dist/patent-or-TS/
          mkdir -p dist/drafting-lab
          cp drafting-lab/index.html dist/drafting-lab/
          mkdir -p dist/deal-room
          cp deal-room/index.html dist/deal-room/
          mkdir -p dist/data
          cp data/*.json dist/data/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
